<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFF"/>
      <stop offset="1" stop-color="#EEF5FF"/>
    </linearGradient>
    <linearGradient id="card" x1="220" y1="160" x2="1180" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FBFF"/>
    </linearGradient>
    <linearGradient id="line" x1="280" y1="0" x2="1120" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A7C8FF"/>
      <stop offset="1" stop-color="#2C8CFF"/>
    </linearGradient>
    <filter id="shadow" x="170" y="120" width="1060" height="620" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#7FA8D8" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#2C8CFF"/>
    </marker>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="200" y="140" width="1000" height="560" rx="36" fill="url(#card)"/>
  </g>

  <text x="250" y="220" fill="#27507E" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="3">TIMING DIAGRAM</text>
  <text x="250" y="270" fill="#111E33" font-family="Helvetica, Arial, sans-serif" font-size="56" font-weight="700">TTFW, TTLW, and WPS</text>
  <text x="250" y="320" fill="#516B8D" font-family="Helvetica, Arial, sans-serif" font-size="28">
    <tspan x="250" dy="0">A request is sent once, then the UI starts streaming,</tspan>
    <tspan x="250" dy="34">and the answer completes later.</tspan>
  </text>

  <line x1="290" y1="450" x2="1110" y2="450" stroke="url(#line)" stroke-width="10" stroke-linecap="round" marker-end="url(#arrow)"/>

  <circle cx="340" cy="450" r="22" fill="#173B68"/>
  <circle cx="640" cy="450" r="22" fill="#1E8D63"/>
  <circle cx="1020" cy="450" r="22" fill="#124FAF"/>

  <line x1="340" y1="382" x2="340" y2="520" stroke="#173B68" stroke-width="4" stroke-dasharray="10 10"/>
  <line x1="640" y1="382" x2="640" y2="520" stroke="#1E8D63" stroke-width="4" stroke-dasharray="10 10"/>
  <line x1="1020" y1="382" x2="1020" y2="520" stroke="#124FAF" stroke-width="4" stroke-dasharray="10 10"/>

  <text x="286" y="565" fill="#173B68" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">Send</text>
  <text x="244" y="598" fill="#5A718F" font-family="Helvetica, Arial, sans-serif" font-size="22">
    <tspan x="244" dy="0">User submits</tspan>
    <tspan x="244" dy="26">prompt</tspan>
  </text>

  <text x="585" y="565" fill="#1E8D63" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">First word</text>
  <text x="520" y="598" fill="#5A718F" font-family="Helvetica, Arial, sans-serif" font-size="22">
    <tspan x="520" dy="0">First real answer</tspan>
    <tspan x="520" dy="26">text appears</tspan>
  </text>

  <text x="973" y="565" fill="#124FAF" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">Last word</text>
  <text x="915" y="598" fill="#5A718F" font-family="Helvetica, Arial, sans-serif" font-size="22">
    <tspan x="915" dy="0">Streaming finishes</tspan>
    <tspan x="915" dy="26">in the UI</tspan>
  </text>

  <path d="M340 365C340 340 356 324 381 324H599C624 324 640 340 640 365" stroke="#1E8D63" stroke-width="6" stroke-linecap="round"/>
  <text x="420" y="310" fill="#1E8D63" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">TTFW</text>
  <text x="385" y="276" fill="#5A718F" font-family="Helvetica, Arial, sans-serif" font-size="22">
    <tspan x="385" dy="0">Time to</tspan>
    <tspan x="385" dy="26">first word</tspan>
  </text>

  <path d="M340 650C340 676 356 692 381 692H979C1004 692 1020 676 1020 650" stroke="#124FAF" stroke-width="6" stroke-linecap="round"/>
  <text x="640" y="745" text-anchor="middle" fill="#124FAF" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">TTLW</text>
  <text x="640" y="778" text-anchor="middle" fill="#5A718F" font-family="Helvetica, Arial, sans-serif" font-size="22">Time to last word</text>

  <rect x="670" y="344" width="272" height="154" rx="22" fill="#EAF4FF" stroke="#C6DEFF" stroke-width="2"/>
  <text x="695" y="400" fill="#27507E" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">WPS Formula</text>
  <text x="695" y="438" fill="#111E33" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">
    <tspan x="695" dy="0">words /</tspan>
    <tspan x="695" dy="32">streaming time</tspan>
  </text>
  <text x="695" y="496" fill="#5A718F" font-family="Helvetica, Arial, sans-serif" font-size="20">
    <tspan x="695" dy="0">Usually measured between</tspan>
    <tspan x="695" dy="24">first and last word.</tspan>
  </text>
</svg>
