<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardsBg" x1="0" y1="0" x2="1400" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAFCFF"/>
      <stop offset="1" stop-color="#EEF4FD"/>
    </linearGradient>
    <filter id="cardShadow" x="90" y="160" width="1220" height="560" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#91A9C9" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="url(#cardsBg)"/>
  <text x="120" y="170" fill="#2B537E" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="3">METRIC DEFINITIONS</text>
  <text x="120" y="225" fill="#0E1C2E" font-family="Helvetica, Arial, sans-serif" font-size="54" font-weight="700">Three numbers, three different questions</text>

  <g filter="url(#cardShadow)">
    <rect x="120" y="280" width="340" height="360" rx="32" fill="white"/>
    <rect x="530" y="280" width="340" height="360" rx="32" fill="white"/>
    <rect x="940" y="280" width="340" height="360" rx="32" fill="white"/>
  </g>

  <rect x="150" y="315" width="110" height="46" rx="16" fill="#EAF4FF"/>
  <text x="205" y="345" text-anchor="middle" fill="#2C74D6" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">LATENCY</text>
  <text x="150" y="415" fill="#0E1C2E" font-family="Helvetica, Arial, sans-serif" font-size="46" font-weight="700">TTFW</text>
  <text x="150" y="458" fill="#4F6887" font-family="Helvetica, Arial, sans-serif" font-size="26">How long until the first real answer appears?</text>
  <text x="150" y="525" fill="#0E1C2E" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">Best for:</text>
  <text x="150" y="562" fill="#4F6887" font-family="Helvetica, Arial, sans-serif" font-size="22">Perceived responsiveness</text>
  <text x="150" y="598" fill="#4F6887" font-family="Helvetica, Arial, sans-serif" font-size="22">Wait-time comparisons</text>

  <rect x="560" y="315" width="120" height="46" rx="16" fill="#EDF9F3"/>
  <text x="620" y="345" text-anchor="middle" fill="#1E8D63" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">DURATION</text>
  <text x="560" y="415" fill="#0E1C2E" font-family="Helvetica, Arial, sans-serif" font-size="46" font-weight="700">TTLW</text>
  <text x="560" y="458" fill="#4F6887" font-family="Helvetica, Arial, sans-serif" font-size="26">How long until the full response finishes streaming?</text>
  <text x="560" y="525" fill="#0E1C2E" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">Best for:</text>
  <text x="560" y="562" fill="#4F6887" font-family="Helvetica, Arial, sans-serif" font-size="22">End-to-end completion time</text>
  <text x="560" y="598" fill="#4F6887" font-family="Helvetica, Arial, sans-serif" font-size="22">Long-response comparisons</text>

  <rect x="970" y="315" width="150" height="46" rx="16" fill="#F0F3FF"/>
  <text x="1045" y="345" text-anchor="middle" fill="#4B63D6" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">THROUGHPUT</text>
  <text x="970" y="415" fill="#0E1C2E" font-family="Helvetica, Arial, sans-serif" font-size="46" font-weight="700">WPS</text>
  <text x="970" y="458" fill="#4F6887" font-family="Helvetica, Arial, sans-serif" font-size="26">How fast does text arrive once streaming begins?</text>
  <text x="970" y="525" fill="#0E1C2E" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">Best for:</text>
  <text x="970" y="562" fill="#4F6887" font-family="Helvetica, Arial, sans-serif" font-size="22">Comparing answer generation speed</text>
  <text x="970" y="598" fill="#4F6887" font-family="Helvetica, Arial, sans-serif" font-size="22">Separating slow start from slow stream</text>

  <rect x="120" y="700" width="1160" height="84" rx="24" fill="#111E33"/>
  <text x="700" y="752" text-anchor="middle" fill="white" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">A model can have low TTFW and still have poor WPS, or vice versa.</text>
</svg>
