<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flowBg" x1="0" y1="0" x2="1400" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF3FB"/>
    </linearGradient>
    <filter id="flowShadow" x="70" y="120" width="1260" height="660" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#8EA8C8" flood-opacity="0.2"/>
    </filter>
    <marker id="flowArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#427BFF"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="url(#flowBg)"/>
  <g filter="url(#flowShadow)">
    <rect x="100" y="150" width="1200" height="590" rx="36" fill="white"/>
  </g>

  <text x="140" y="240" fill="#2B537E" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="3">REQUEST / RESPONSE FLOW</text>
  <text x="140" y="292" fill="#0E1C2E" font-family="Helvetica, Arial, sans-serif" font-size="54" font-weight="700">What the UI is doing while you measure</text>

  <rect x="150" y="380" width="220" height="180" rx="28" fill="#173B68"/>
  <text x="260" y="445" text-anchor="middle" fill="white" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700">User</text>
  <text x="260" y="490" text-anchor="middle" fill="#D9E8FF" font-family="Helvetica, Arial, sans-serif" font-size="22">Types prompt</text>
  <text x="260" y="522" text-anchor="middle" fill="#D9E8FF" font-family="Helvetica, Arial, sans-serif" font-size="22">Clicks send</text>

  <rect x="470" y="350" width="260" height="240" rx="28" fill="#F3F8FF" stroke="#C6DBFF" stroke-width="3"/>
  <text x="600" y="410" text-anchor="middle" fill="#173B68" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700">App UI</text>
  <text x="600" y="456" text-anchor="middle" fill="#4E698A" font-family="Helvetica, Arial, sans-serif" font-size="22">May show placeholders like</text>
  <text x="600" y="492" text-anchor="middle" fill="#111E33" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">"Working"</text>
  <text x="600" y="526" text-anchor="middle" fill="#111E33" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">"Searching the web"</text>
  <text x="600" y="565" text-anchor="middle" fill="#4E698A" font-family="Helvetica, Arial, sans-serif" font-size="20">These should not count as first-word content.</text>

  <rect x="860" y="350" width="290" height="240" rx="28" fill="#F1FCF7" stroke="#BFE9D3" stroke-width="3"/>
  <text x="1005" y="410" text-anchor="middle" fill="#146B48" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700">Real answer</text>
  <text x="1005" y="456" text-anchor="middle" fill="#4E698A" font-family="Helvetica, Arial, sans-serif" font-size="22">First meaningful text arrives</text>
  <text x="1005" y="500" text-anchor="middle" fill="#111E33" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">TTFW starts here</text>
  <text x="1005" y="544" text-anchor="middle" fill="#4E698A" font-family="Helvetica, Arial, sans-serif" font-size="20">Then continue counting until the stream ends.</text>

  <line x1="370" y1="470" x2="470" y2="470" stroke="#427BFF" stroke-width="8" stroke-linecap="round" marker-end="url(#flowArrow)"/>
  <line x1="730" y1="470" x2="860" y2="470" stroke="#427BFF" stroke-width="8" stroke-linecap="round" marker-end="url(#flowArrow)"/>

  <text x="420" y="450" text-anchor="middle" fill="#427BFF" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">Prompt sent</text>
  <text x="795" y="450" text-anchor="middle" fill="#427BFF" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">Real content appears</text>

  <rect x="190" y="640" width="1020" height="70" rx="20" fill="#EFF5FF"/>
  <text x="700" y="686" text-anchor="middle" fill="#27507E" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">Good instrumentation ignores placeholder states and waits for visible answer text.</text>
</svg>
